<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mailivox</title>
  <link rel="stylesheet" href="../popup/popup.css">
</head>
<body class="sidepanel">
  <main class="shell">
    <header class="topbar">
      <div class="brand-mark">M</div>
      <div>
        <h1>MAILIVOX</h1>
        <p id="pageLabel">LinkedIn extractor</p>
      </div>
      <button id="refreshBtn" class="icon-btn" title="Refresh detection" aria-label="Refresh">↻</button>
      <button id="optionsBtn" class="icon-btn" title="Settings" aria-label="Settings">...</button>
    </header>

    <section class="status-row">
      <span id="connectionDot" class="dot"></span>
      <span id="connectionText">Checking backend...</span>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <h2>Quick Extract</h2>
          <p>Send visible rows to Lead Intelligence</p>
        </div>
        <strong id="profileCount">0</strong>
      </div>
      <button id="quickBtn" class="primary">Run Lead Intelligence</button>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <h2>Deep Extract</h2>
          <p>1st-degree connection emails</p>
        </div>
        <strong id="connectionCount">0</strong>
      </div>
      <button id="deepBtn" class="secondary">Extract Emails</button>
    </section>

    <section class="progress">
      <div class="progress-meta">
        <span id="progressLabel">Idle</span>
        <span id="progressNumbers">0/0</span>
      </div>
      <div class="bar"><span id="progressBar"></span></div>
      <div class="progress-meta muted">
        <span id="emailsFound">Emails found: 0</span>
      </div>
      <button id="stopBtn" class="stop-btn" disabled>⬛ STOP ALL</button>
    </section>

    <p id="message" class="message"></p>

    <footer>
      <button id="dashboardBtn" class="footer-link">Open Dashboard</button>
    </footer>
  </main>
  <script src="../popup/popup.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mailivox Extension Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main>
    <header>
      <h1>Mailivox Extension Settings</h1>
      <p>Configure the backend, token, and LinkedIn pacing.</p>
    </header>

    <label>
      Backend API URL
      <input id="apiUrl" type="url" placeholder="https://mailivox-backend.onrender.com">
    </label>

    <label>
      JWT token
      <textarea id="token" rows="5" placeholder="Paste mailivox_token here"></textarea>
    </label>

    <div class="grid">
      <label>
        Min delay (ms)
        <input id="minDelayMs" type="number" min="1000" step="250">
      </label>
      <label>
        Max delay (ms)
        <input id="maxDelayMs" type="number" min="1000" step="250">
      </label>
      <label>
        Deep extract limit
        <input id="maxDeepProfiles" type="number" min="1" max="100" step="1">
      </label>
    </div>

    <div class="actions">
      <button id="saveBtn">Save Settings</button>
      <button id="dashboardBtn" class="secondary">Open Dashboard</button>
    </div>

    <p id="status" class="status"></p>
  </main>
  <script src="options.js"></script>
</body>
</html>

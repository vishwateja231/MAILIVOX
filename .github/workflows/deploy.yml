name: Mailivox CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Syntax check
        run: |
          node --check server.js
          for f in routes/*.js; do node --check "$f"; done
      - name: Run unit tests
        run: node --test tests/nameParser.test.js tests/generator.test.js tests/validation.test.js tests/linkedInParser.test.js

  frontend-test:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint || true
      - name: Build
        run: npm run build

  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: [frontend-test, backend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Deploy to Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-backend:
    name: Deploy Backend (Render)
    needs: [frontend-test, backend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --fail --silent --show-error

  smoke-test:
    name: Production Smoke Test
    needs: [deploy-frontend, deploy-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deploy
        run: sleep 60
      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.VITE_API_URL }}/health)
          if [ "$STATUS" != "200" ]; then exit 1; fi
      - name: Auth endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            ${{ secrets.VITE_API_URL }}/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"test","password":"test"}')
          if [ "$STATUS" != "401" ]; then exit 1; fi
      - name: Frontend check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.FRONTEND_URL }})
          if [ "$STATUS" != "200" ]; then exit 1; fi
